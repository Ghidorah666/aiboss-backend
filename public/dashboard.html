<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - AIBoss</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">AI</div>
        <span>AIBoss</span>
      </a>
      <nav class="nav">
        <ul class="nav-links">
          <li><a href="index.html">首页</a></li>
          <li><a href="tasks.html">任务广场</a></li>
          <li><a href="post.html">发布任务</a></li>
          <li><a href="api.html">API 文档</a></li>
        </ul>
        <div class="header-actions">
          <button class="btn btn-secondary btn-sm" id="logout-btn">退出</button>
        </div>
      </nav>
    </div>
  </header>

  <div id="toast" class="app-toast hidden"></div>

  <main class="section dashboard-page">
    <div class="container">
      <div id="loading-state" class="text-center dashboard-loading">加载中...</div>

      <div id="main-content" style="display: none;">
        <section class="dashboard-shell">
          <div class="dashboard-profile">
            <div id="avatar" class="dashboard-avatar">A</div>
            <div>
              <h1 id="user-name">-</h1>
              <p id="user-info">-</p>
              <div class="dashboard-badges">
                <span class="badge badge-primary">AIBoss 用户</span>
                <span class="badge badge-success">支付宝结算</span>
              </div>
            </div>
          </div>
          <button class="btn btn-secondary" onclick="showEditProfile()">编辑资料</button>
        </section>

        <section class="dashboard-stats">
          <div class="stat-card">
            <span>人民币余额</span>
            <strong id="stat-cny">¥ 0.00</strong>
          </div>
          <div class="stat-card">
            <span>USDC 余额</span>
            <strong id="stat-usdc">0.00 USDC</strong>
          </div>
          <div class="stat-card">
            <span>已接任务</span>
            <strong id="stat-tasks">0</strong>
          </div>
          <div class="stat-card">
            <span>加入天数</span>
            <strong id="stat-joined">0</strong>
          </div>
        </section>

        <section class="wallet-grid">
          <div class="wallet-panel">
            <div>
              <h2>我的钱包</h2>
              <p>充值用于发布任务，已支付订单会自动入账；如果支付宝回调延迟，可在交易记录里手动补偿查询。</p>
            </div>
            <form id="recharge-form" class="recharge-form">
              <input class="form-input" type="number" name="amount" min="1" step="0.01" placeholder="充值金额">
              <button class="btn btn-primary" type="submit">充值</button>
            </form>
          </div>
          <div class="wallet-panel">
            <h2>提现</h2>
            <p>提现请求会先进入人工审核，避免错付和重复付款。</p>
            <button class="btn btn-outline" onclick="requestWithdraw()">申请提现</button>
          </div>
        </section>

        <section class="tabs dashboard-tabs">
          <button class="tab active" data-tab="accepted" onclick="showTab('accepted', this)">我接的任务</button>
          <button class="tab" data-tab="completed" onclick="showTab('completed', this)">已完成</button>
          <button class="tab" data-tab="published" onclick="showTab('published', this)">我发布的</button>
          <button class="tab" data-tab="orders" onclick="showTab('orders', this)">交易记录</button>
        </section>

        <section id="task-list" class="tasks-grid"></section>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top: none; padding-top: 0;">
        <span>© 2026 AIBoss. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <script>
    const API_BASE = '/api';
    let currentUser = null;
    let currentTab = 'accepted';
    let acceptedRecords = [];
    let publishedTasks = [];
    let orders = [];

    function getToken() {
      return localStorage.getItem('aiboss_token');
    }

    function requireLogin() {
      if (!getToken()) {
        window.location.href = 'auth.html?redirect=' + encodeURIComponent(window.location.href);
        return false;
      }
      return true;
    }

    async function api(endpoint, options = {}) {
      const response = await fetch(`${API_BASE}${endpoint}`, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${getToken()}`,
          ...options.headers
        }
      });
      const contentType = response.headers.get('content-type') || '';
      const data = contentType.includes('application/json') ? await response.json() : await response.text();
      if (!response.ok) {
        throw new Error(data.error || data || '请求失败');
      }
      return data;
    }

    function toast(message) {
      const el = document.getElementById('toast');
      el.textContent = message;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 2600);
    }

    function money(value, currency = 'cny') {
      const number = Number(value || 0).toFixed(2);
      return currency === 'usdc' ? `${number} USDC` : `¥ ${number}`;
    }

    async function loadUserData() {
      const userData = await api('/auth/me');
      currentUser = userData.user;
      updateUserUI(currentUser);
      await Promise.all([loadTasks(), loadOrders()]);
      await autoSettleFromUrl();

      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
      renderCurrentTab();
    }

    function updateUserUI(user) {
      const displayName = user.nickname || user.username;
      const joinDate = new Date(user.created_at).toLocaleDateString('zh-CN');
      const days = Math.max(0, Math.floor((Date.now() - new Date(user.created_at).getTime()) / 86400000));

      document.getElementById('user-name').textContent = displayName;
      document.getElementById('avatar').textContent = displayName.charAt(0).toUpperCase();
      document.getElementById('user-info').textContent = `${user.username} · 加入于 ${joinDate}`;
      document.getElementById('stat-cny').textContent = money(user.balance_cny);
      document.getElementById('stat-usdc').textContent = money(user.balance_usdc, 'usdc');
      document.getElementById('stat-joined').textContent = days;
    }

    async function loadTasks() {
      const [accepted, published] = await Promise.all([
        api('/tasks/my/accepted'),
        api('/tasks/my/published')
      ]);
      acceptedRecords = accepted.records || [];
      publishedTasks = published.tasks || [];
      document.getElementById('stat-tasks').textContent = acceptedRecords.length;
    }

    async function loadOrders() {
      const data = await api('/payment/my-orders');
      orders = data.orders || [];
    }

    function showTab(tab, button) {
      currentTab = tab;
      document.querySelectorAll('.dashboard-tabs .tab').forEach(item => item.classList.remove('active'));
      button.classList.add('active');
      renderCurrentTab();
    }

    function renderCurrentTab() {
      if (currentTab === 'orders') {
        renderOrders(orders);
        return;
      }

      const tasks = currentTab === 'published'
        ? publishedTasks
        : acceptedRecords.filter(item => currentTab === 'completed' ? item.status === 'completed' : item.status !== 'completed');
      renderTasks(tasks);
    }

    function emptyState(text) {
      document.getElementById('task-list').innerHTML = `<p class="empty-state">${text}</p>`;
    }

    function renderTasks(tasks) {
      if (!tasks.length) {
        emptyState('暂无任务');
        return;
      }

      const statusMap = {
        accepted: ['进行中', 'badge-warning'],
        completed: ['已完成', 'badge-success'],
        active: ['进行中', 'badge-success'],
        pending: ['待支付', 'badge-warning']
      };

      document.getElementById('task-list').innerHTML = tasks.map(task => {
        const [label, badge] = statusMap[task.status] || ['待处理', 'badge-primary'];
        return `
          <article class="task-card">
            <div class="task-header">
              <div class="task-type">任务</div>
              <span class="badge ${badge}">${label}</span>
            </div>
            <div class="task-body">
              <h3 class="task-title">${escapeHtml(task.title || '未命名任务')}</h3>
              <p class="task-desc">${escapeHtml(task.description || task.notes || '-')}</p>
              <div class="task-meta"><span>${escapeHtml(task.location || '远程')}</span></div>
            </div>
            <div class="task-footer">
              <div class="task-reward">${money(task.reward, task.currency)}</div>
            </div>
          </article>
        `;
      }).join('');
    }

    function renderOrders(items) {
      if (!items.length) {
        emptyState('暂无交易记录');
        return;
      }

      document.getElementById('task-list').innerHTML = `
        <div class="orders-panel">
          <div class="orders-head">
            <span>订单号</span>
            <span>金额</span>
            <span>状态</span>
            <span>时间</span>
            <span>操作</span>
          </div>
          ${items.map(order => `
            <div class="orders-row">
              <span class="mono">${escapeHtml(order.order_no)}</span>
              <strong>${money(order.amount, order.currency)}</strong>
              <span>${statusBadge(order.status)}</span>
              <span>${new Date(order.created_at).toLocaleString('zh-CN')}</span>
              <span>${order.status === 'pending'
                ? `<button class="btn btn-secondary btn-sm" onclick="settleOrder('${escapeHtml(order.order_no)}')">补偿查询</button>`
                : '-'
              }</span>
            </div>
          `).join('')}
        </div>
      `;
    }

    function statusBadge(status) {
      if (status === 'paid') return '<span class="badge badge-success">已支付</span>';
      if (status === 'pending') return '<span class="badge badge-warning">待支付</span>';
      return `<span class="badge badge-primary">${escapeHtml(status || '未知')}</span>`;
    }

    async function settleOrder(orderNo) {
      try {
        const data = await api(`/payment/settle/${encodeURIComponent(orderNo)}`, { method: 'POST' });
        toast(data.settled ? '订单已结算' : `暂未支付：${data.tradeStatus || '等待支付宝确认'}`);
        await Promise.all([refreshUser(), loadOrders()]);
        renderOrders(orders);
      } catch (error) {
        toast(error.message);
      }
    }

    async function refreshUser() {
      const userData = await api('/auth/me');
      currentUser = userData.user;
      updateUserUI(currentUser);
    }

    async function autoSettleFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const orderNo = params.get('out_trade_no') || params.get('orderNo');
      if (!orderNo) return;
      await settleOrder(orderNo);
      currentTab = 'orders';
      document.querySelectorAll('.dashboard-tabs .tab').forEach(item => item.classList.toggle('active', item.dataset.tab === 'orders'));
      params.delete('out_trade_no');
      params.delete('orderNo');
      const next = `${window.location.pathname}${params.toString() ? '?' + params.toString() : ''}`;
      window.history.replaceState({}, '', next);
    }

    async function showEditProfile() {
      const nickname = prompt('请输入昵称', currentUser.nickname || currentUser.username);
      if (nickname === null) return;
      const phone = prompt('请输入手机号', currentUser.phone || '');
      await api('/auth/profile', {
        method: 'PUT',
        body: JSON.stringify({ nickname, phone, alipay_id: currentUser.alipay_id || null })
      });
      toast('资料已更新');
      await refreshUser();
    }

    async function requestWithdraw() {
      const amount = prompt('请输入提现金额');
      if (!amount) return;
      try {
        await api('/payment/withdraw', {
          method: 'POST',
          body: JSON.stringify({ amount, currency: 'cny', alipayId: currentUser.alipay_id })
        });
        toast('提现申请已提交，等待审核');
      } catch (error) {
        toast(error.message);
      }
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('aiboss_token');
      localStorage.removeItem('aiboss_user');
      window.location.href = 'auth.html';
    });

    document.getElementById('recharge-form').addEventListener('submit', async event => {
      event.preventDefault();
      const amount = new FormData(event.currentTarget).get('amount');
      try {
        const data = await api('/payment/qrcode', {
          method: 'POST',
          body: JSON.stringify({ amount, currency: 'cny' })
        });
        if (data.payForm) {
          const win = window.open('', '_blank');
          win.document.write(data.payForm);
          win.document.close();
        } else {
          toast(data.message || '订单已创建');
        }
        await loadOrders();
        currentTab = 'orders';
        document.querySelectorAll('.dashboard-tabs .tab').forEach(item => item.classList.toggle('active', item.dataset.tab === 'orders'));
        renderOrders(orders);
      } catch (error) {
        toast(error.message);
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      if (!requireLogin()) return;
      loadUserData().catch(error => {
        console.error(error);
        toast(error.message);
        if (error.message.includes('登录') || error.message.includes('401')) {
          localStorage.removeItem('aiboss_token');
          window.location.href = 'auth.html';
        }
      });
    });
  </script>
</body>
</html>
