<!DOCTYPE html>
<html lang="cn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 / 注册 - AIBoss</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(var(--header-height) + var(--space-xl)) var(--space-lg) var(--space-xl);
    }
    
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: var(--space-2XL);
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: var(--space-xl);
    }
    
    .auth-header h1 {
      font-size: 1.75rem;
      margin-bottom: var(--space-xs);
    }
    
    .auth-header p {
      color: var(--text-secondary);
    }
    
    .auth-divider {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      margin: var(--space-lg) 0;
      color: var(--text-tertiary);
      font-size: 0.875rem;
    }
    
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }
    
    .alipay-btn {
      width: 100%;
      padding: var(--space-md);
      background: #1677FF;
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      transition: all var(--transition-fast);
    }
    
    .alipay-btn:hover {
      background: #0958DB;
      transform: translateY(-2px);
    }
    
    .form-error {
      background: rgba(255, 69, 58, 0.1);
      border: 1px solid rgba(255, 69, 58, 0.3);
      color: #FF3B30;
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      margin-bottom: var(--space-md);
      display: none;
    }
    
    .form-error.show {
      display: block;
    }
    
    .form-success {
      background: rgba(52, 199, 89, 0.1);
      border: 1px solid rgba(52, 199, 89, 0.3);
      color: #34C759;
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      margin-bottom: var(--space-md);
      display: none;
    }
    
    .form-success.show {
      display: block;
    }
    
    .loading {
      opacity: 0.7;
      pointer-events: none;
    }
    
    .agreement {
      font-size: 0.8125rem;
      color: var(--text-tertiary);
      text-align: center;
      margin-top: var(--space-md);
    }
    
    .agreement a {
      color: var(--primary);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <div class="logo-icon">AI</div>
        <span>AIBoss</span>
      </a>
      <nav class="nav">
        <div class="header-actions">
          <a href="index.html" class="btn btn-secondary btn-sm">返回首页</a>
        </div>
      </nav>
    </div>
  </header>

  <!-- Auth Content -->
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>欢迎加入AIBoss</h1>
        <p>让AI老板带你赚钱</p>
      </div>

      <!-- Error/Success Messages -->
      <div id="form-error" class="form-error"></div>
      <div id="form-success" class="form-success"></div>

      <!-- Login Tabs -->
      <div class="tabs" style="margin-bottom: var(--space-xl);">
        <button class="tab active" id="tab-login" onclick="switchTab('login')">登录</button>
        <button class="tab" id="tab-register" onclick="switchTab('register')">注册</button>
      </div>

      <!-- Login Form -->
      <div id="login-form">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input type="text" id="login-username" class="form-input" placeholder="请输入用户名" autocomplete="username">
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" id="login-password" class="form-input" placeholder="请输入密码" autocomplete="current-password">
        </div>

        <button class="btn btn-primary btn-lg" style="width: 100%;" id="login-btn" onclick="handleLogin()">
          登录
        </button>
      </div>

      <!-- Register Form -->
      <div id="register-form" style="display: none;">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input type="text" id="reg-username" class="form-input" placeholder="请输入用户名（用于登录）" autocomplete="username">
        </div>

        <div class="form-group">
          <label class="form-label">昵称</label>
          <input type="text" id="reg-nickname" class="form-input" placeholder="请输入昵称（选填）" autocomplete="nickname">
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" id="reg-password" class="form-input" placeholder="请设置登录密码（至少6位）" autocomplete="new-password">
        </div>

        <div class="form-group">
          <label class="form-label">手机号（选填）</label>
          <input type="tel" id="reg-phone" class="form-input" placeholder="请输入手机号（用于接收通知）" autocomplete="tel">
        </div>

        <button class="btn btn-primary btn-lg" style="width: 100%;" id="register-btn" onclick="handleRegister()">
          立即注册
        </button>

        <p class="agreement">
          注册即表示同意<a href="#">《用户协议》</a>和<a href="#">《隐私政策》</a>
        </p>
      </div>

      <div class="auth-divider">或</div>

      <!-- Alipay Login (Coming Soon) -->
      <button class="alipay-btn" onclick="showError('支付宝登录正在开发中...')">
        <span style="font-size: 1.25rem;">💙</span>
        <span>使用支付宝登录</span>
      </button>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    const API_BASE = '/api';
    
    // 显示错误信息
    function showError(msg) {
      const el = document.getElementById('form-error');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 5000);
    }
    
    // 显示成功信息
    function showSuccess(msg) {
      const el = document.getElementById('form-success');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3000);
    }
    
    // Tab切换
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      
      if (tab === 'login') {
        document.getElementById('login-form').style.display = 'block';
        document.getElementById('register-form').style.display = 'none';
      } else {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('register-form').style.display = 'block';
      }
      
      // 清除消息
      document.getElementById('form-error').classList.remove('show');
      document.getElementById('form-success').classList.remove('show');
    }
    
    // 登录
    async function handleLogin() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-btn');
      
      if (!username || !password) {
        showError('请输入用户名和密码');
        return;
      }
      
      btn.classList.add('loading');
      btn.textContent = '登录中...';
      
      try {
        const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || '登录失败');
        }
        
        // 保存token和用户信息
        localStorage.setItem('aiboss_token', data.token);
        localStorage.setItem('aiboss_user', JSON.stringify(data.user));
        
        showSuccess('登录成功！正在跳转...');
        
        // 跳转到首页或来源页面
        setTimeout(() => {
          const redirect = new URLSearchParams(window.location.search).get('redirect');
          window.location.href = redirect || 'index.html';
        }, 500);
        
      } catch (error) {
        showError(error.message);
        btn.classList.remove('loading');
        btn.textContent = '登录';
      }
    }
    
    // 注册
    async function handleRegister() {
      const username = document.getElementById('reg-username').value.trim();
      const nickname = document.getElementById('reg-nickname').value.trim();
      const password = document.getElementById('reg-password').value;
      const phone = document.getElementById('reg-phone').value.trim();
      const btn = document.getElementById('register-btn');
      
      if (!username || !password) {
        showError('用户名和密码不能为空');
        return;
      }
      
      if (password.length < 6) {
        showError('密码至少6位');
        return;
      }
      
      btn.classList.add('loading');
      btn.textContent = '注册中...';
      
      try {
        const response = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, nickname, phone })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || '注册失败');
        }
        
        // 保存token和用户信息
        localStorage.setItem('aiboss_token', data.token);
        localStorage.setItem('aiboss_user', JSON.stringify(data.user));
        
        showSuccess('注册成功！正在跳转...');
        
        // 跳转到首页
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 500);
        
      } catch (error) {
        showError(error.message);
        btn.classList.remove('loading');
        btn.textContent = '立即注册';
      }
    }
    
    // 监听回车键
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const loginVisible = document.getElementById('login-form').style.display !== 'none';
        if (loginVisible) {
          handleLogin();
        } else {
          handleRegister();
        }
      }
    });
  </script>
</body>
</html>
